<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPO Analysis - Scatter Plot</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v4.min.js"></script>
</head>
<body>
    <nav>
        <div class="logo">IPO Visualization Project</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="distribution.html">Distribution</a></li>
            <li><a href="boxplot.html">Box Plot</a></li>
            <li><a href="scatter.html">Scatter</a></li>
            <li><a href="cumulative.html">Cumulative</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <div class="container" style="position: relative;">
        <button class="nav-arrow left" id="left-arrow" onclick="moveSlide(-1)" style="display: none;">&#10094;</button>
        <button class="nav-arrow right" id="right-arrow" onclick="moveSlide(1)">&#10095;</button>

        <div class="slider-window">
            <div class="slider-track" id="main-track" style="display: flex; width: 200%; transition: transform 0.6s ease-in-out;">
                
                <div class="slide" style="width: 50%; flex-shrink: 0; box-sizing: border-box; padding: 0 10px;">
                    <h1>Performance Correlation</h1>
                    <div class="chart-card">
                        <div class="controls-row">
                            <div class="control-item">
                                <span class="control-label">X Axis</span>
                                <select id="x-axis" class="axis-select" onchange="updateScatterAxes()">
                                    <option value="IPO_Day_Return_Pct">Day 1 Return %</option>
                                    <option value="IPO_Open">IPO Open Price</option>
                                </select>
                            </div>
                            <div class="control-item">
                                <span class="control-label">Y Axis</span>
                                <select id="y-axis" class="axis-select" onchange="updateScatterAxes()">
                                    <option value="Month_Return_Pct">Month 1 Return %</option>
                                    <option value="IPO_Day_Return_Pct">Day 1 Return %</option>
                                    <option value="Month_End_Close">Month End Close</option>
                                </select>
                            </div>
                        </div>

                        <div class="control-group">
                            <span class="control-label">Filter Sectors</span>
                            <div class="sector-grid">
                                <button class="sector-btn active" onclick="filterSector('All', this)">All</button>
                                <button class="sector-btn" onclick="filterSector('Technology', this)">Information Technology</button>
                                <button class="sector-btn" onclick="filterSector('Healthcare', this)">Health Care</button>
                                <button class="sector-btn" onclick="filterSector('Financial Services', this)">Financials</button>
                                <button class="sector-btn" onclick="filterSector('Consumer Cyclical', this)">Consumer Discretionary</button>
                                <button class="sector-btn" onclick="filterSector('Consumer Defensive', this)">Consumer Staples</button>
                                <button class="sector-btn" onclick="filterSector('Basic Materials', this)">Materials</button>
                                <button class="sector-btn" onclick="filterSector('Industrials', this)">Industrials</button>
                                <button class="sector-btn" onclick="filterSector('Energy', this)">Energy</button>
                                <button class="sector-btn" onclick="filterSector('Real Estate', this)">Real Estate</button>
                                <button class="sector-btn" onclick="filterSector('Communication Services', this)">Communication Services</button>
                                <button class="sector-btn" onclick="filterSector('Utilities', this)">Utilities</button>
                            </div>
                        </div>
                        <div id="viz" class="viz-container"></div>
                    </div>
                </div>

                <div class="slide" style="width: 50%; flex-shrink: 0; box-sizing: border-box; padding: 0 10px;">
                    <h1>Company Deep-Dive</h1>
                    <div class="chart-card">
                        <div class="control-group">
                            <span class="control-label">Search Ticker or Name</span>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="company-search-input" placeholder="e.g. AAPL or Apple" style="padding: 12px; flex: 1; border: 1px solid #ddd; border-radius: 4px;">
                                <button class="btn-primary" onclick="executeCompanySearch()">Search</button>
                            </div>
                        </div>
                        <div id="search-result-display">
                            <p style="text-align: center; color: #666; padding: 50px 0;">Enter a ticker to see performance metrics.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="nav.js"></script>
    <script src="filters.js"></script>
    <script src="charts/scatter.js"></script>
</body>
</html>
